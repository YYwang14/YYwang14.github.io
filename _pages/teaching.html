---
layout: archive
title: "Teaching"
permalink: /teaching/
author_profile: true
---

{% include base_path %}

{% for post in site.teaching reversed %}
  <section class="archive__item" itemscope itemtype="http://schema.org/CreativeWork">
    <h2 class="archive__item-title" itemprop="headline">{{ post.title }}</h2>
    <p>{{ post.period }}, <i>{{ post.venue }}</i>, {{ post.location }}</p>
    <div class="archive__item-excerpt" itemprop="description">
      {{ post.content }}
    </div>
  </section>
{% endfor %}
